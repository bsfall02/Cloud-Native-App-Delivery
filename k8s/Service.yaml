apiVersion: v1
kind: Service
metadata:
  name: inventory-app-service
  labels:
    app: inventory-app
spec:
  type: NodePort           # NodePort pour Minikube / K3s
  selector:
    app: inventory-app
  ports:
    - name: http
      protocol: TCP
      port: 80             # Port exposé par le Service
      targetPort: 3000     # Port du container Spring Boot
      nodePort: 30080      # Port accessible depuis l'extérieur (30000–32767)
