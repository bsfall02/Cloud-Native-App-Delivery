name: CI/CD — Build & Push to Docker Hub

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: inventory-app

jobs:
  build-and-push:
    name: Build Docker Image & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # ── 1. Récupérer le code ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Installer les dépendances & lancer les tests ───
      - name: Install dependencies
        run: npm install --prefix app

      - name: Run tests
        run: npm test --prefix app --if-present

      # ── 4. Se connecter à Docker Hub ──────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Générer les tags de l'image ────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v1.0
            type=sha,prefix=sha-

      # ── 6. Build & Push sur Docker Hub ───────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}